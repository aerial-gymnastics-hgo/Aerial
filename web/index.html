<!DOCTYPE html>
<html>
<head>
  <!--

    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="scratch">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>scratch</title>
  <link rel="manifest" href="manifest.json">

  <script>
    // The value below is injected by flutter build, do not touch.
    const serviceWorkerVersion = null;
  </script>
  <!-- Rotation Alerts: Web Notifications API stub for Flutter Web -->
  <script>
    // Called by NotificationService when running on Flutter Web.
    function showRotationNotification(title, body) {
      if (!('Notification' in window)) return;
      if (Notification.permission === 'granted') {
        new Notification(title, { body: body, icon: 'icons/Icon-192.png', requireInteraction: true });
      } else if (Notification.permission !== 'denied') {
        Notification.requestPermission().then(function(permission) {
          if (permission === 'granted') {
            new Notification(title, { body: body, icon: 'icons/Icon-192.png', requireInteraction: true });
          }
        });
      }
    }
    // Request permission early so alerts work immediately when activated
    window.addEventListener('load', function() {
      if ('Notification' in window && Notification.permission === 'default') {
        Notification.requestPermission();
      }
    });
  </script>
  <!-- This script adds the flutter initialization JS code -->
  <script src="flutter.js" defer></script>
  <!-- Splash Screen Styles -->
  <style>
    body { background-color: #121212; margin: 0; }
    #splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #121212;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.5s ease-out;
      font-family: 'Montserrat', sans-serif, system-ui;
    }
    .leap-icon {
      width: 100px;
      height: 100px;
      animation: leap 1.5s infinite ease-in-out;
    }
    @keyframes leap {
      0% { transform: translateY(0) rotate(-5deg); opacity: 0.8; }
      50% { transform: translateY(-15px) rotate(5deg); opacity: 1; }
      100% { transform: translateY(0) rotate(-5deg); opacity: 0.8; }
    }
    .splash-text {
      margin-top: 24px;
      color: #E91E63;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 3px;
      animation: pulse 1.5s infinite ease-in-out;
    }
    @keyframes pulse {
      0% { opacity: 0.5; }
      50% { opacity: 1; }
      100% { opacity: 0.5; }
    }
  </style>
</head>
<body>
  <div id="splash-screen">
    <!-- Stylized split leap gymnast -->
    <svg class="leap-icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="30" r="7" fill="#E91E63"/>
      <path d="M48 37 C52 45 55 55 50 65" stroke="#E91E63" stroke-width="5" stroke-linecap="round"/>
      <path d="M50 65 Q35 60 15 65" stroke="#E91E63" stroke-width="5" stroke-linecap="round"/>
      <path d="M50 65 Q65 55 85 50" stroke="#E91E63" stroke-width="5" stroke-linecap="round"/>
      <path d="M49 42 Q35 30 25 25" stroke="#E91E63" stroke-width="5" stroke-linecap="round"/>
      <path d="M49 42 Q65 40 75 45" stroke="#E91E63" stroke-width="5" stroke-linecap="round"/>
    </svg>
    <div class="splash-text">AERIAL GIMNASIA</div>
  </div>
  <script>
    window.addEventListener('load', function(ev) {
      // Download main.dart.js
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: serviceWorkerVersion,
        },
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
            appRunner.runApp().then(function() {
              // Hide splash screen when app is loaded
              var splash = document.getElementById('splash-screen');
              if (splash) {
                splash.style.opacity = '0';
                setTimeout(function() { splash.remove(); }, 500);
              }
            });
          });
        }
      });
    });
  </script>
</body>
</html>
